name: Feature request
description: Suggest an idea or improvement for the extension.
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you are trying to solve before proposing a solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
      description: What user pain point or limitation motivates this request?
      placeholder: When I try to ..., I cannot ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior or UX you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fall short.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, prior art, or anything else that helps.
    validations:
      required: false
