name: Bug report
description: Report a reproducible problem with the extension.
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the fields below so we can reproduce the issue quickly.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the problem.
      placeholder: What went wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Step by step instructions to reproduce the behavior.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      description: e.g. Chrome 124, Edge 124, Brave 1.65
      placeholder: Chrome 124.0.6367.60
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      description: The version of markdownly you are running.
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: page-url
    attributes:
      label: Page URL
      description: The URL where the issue occurred (if applicable and shareable).
      placeholder: https://example.com/article
    validations:
      required: false
  - type: textarea
    id: console-logs
    attributes:
      label: Console logs from the service worker DevTools
      description: Open chrome://extensions, click the service worker link for markdownly, and paste relevant console output.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: searched
    attributes:
      label: Prior research
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
